<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini CLI Project</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 3rem;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }
        h1 { margin-bottom: 1rem; font-size: 2.5rem; }
        p { font-size: 1.2rem; opacity: 0.9; }
        .status {
            margin-top: 2rem;
            padding: 0.5rem 1rem;
            background: #48bb78;
            border-radius: 50px;
            display: inline-block;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hello from Gemini CLI! 🚀</h1>
        <p>성공적으로 배포된 첫 번째 프로젝트 페이지입니다.</p>
        <div class="status">Live Online</div>
    </div>
</body>
</html>
